<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaClone</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="light">

<!-- FORCE LOGIN TO SHOW ALWAYS -->
<script> localStorage.removeItem("loggedIn"); </script>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <h2>InstaClone</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button id="changePassBtn" class="change-btn">Change Password</button>
  </div>
</div>

<button id="toggleMode">Dark Mode</button>

<!-- Left Sidebar -->
<aside class="left-sidebar">
  <div class="sidebar-menu">
    <ul>
      <li>🏠 Home</li>
      <li>🔍 Explore</li>
      <li>🎥 Reels</li>
      <li>💬 Messages</li>
      <li>❤️ Notifications</li>
      <li>➕ Create</li>
      <li>👤 Profile</li>
      <li>⚙️ More</li>
    </ul>
  </div>
  <div class="meta-footer">
    <p>From <b>Meta</b></p>
  </div>
</aside>

<header>
  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram Logo" class="insta-logo">
  </div>
  <input type="text" class="search-bar" placeholder="Search">
  <div class="header-icons">
    
  </div>
</header>

<div class="main">
  <div class="feed-container">

    <div class="stories" id="stories"></div>

    <div class="new-post">
      <input type="text" id="newUsername" placeholder="Username">
      <input type="text" id="newImage" placeholder="Image URL">
      <textarea id="newCaption" placeholder="Caption"></textarea>
      <button id="addPost">Add Post</button>
    </div>

    <div class="feed" id="feed"></div>
  </div>

  <div class="sidebar">
    <h3>Suggestions</h3>
    <div class="profile">
      <div class="avatar"><img src="https://randomuser.me/api/portraits/women/81.jpg"></div>
      <div class="username">Ruthy</div>
    </div>
    <div class="profile">
      <div class="avatar"><img src="https://randomuser.me/api/portraits/men/60.jpg"></div>
      <div class="username">Aaron</div>
    </div>
    <div class="profile">
      <div class="avatar"><img src="https://randomuser.me/api/portraits/women/55.jpg"></div>
      <div class="username">Jennie</div>
    </div>
    <div class="profile">
      <div class="avatar"><img src="http://www.designbolts.com/wp-content/uploads/2019/02/attractive-woman-free-stock-photo-1.jpg"></div>
      <div class="username">Lisa</div>
    </div>
  </div>
</div>

<footer>

  <a href="#">Help</a> • 
  <a href="#">Privacy</a> • 
  <a href="#">Terms</a> • 
  <a href="#">Contact</a>
</footer>

<script src="script.js"></script>
</body>
</html>
